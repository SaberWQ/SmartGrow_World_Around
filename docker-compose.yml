# ============================================
# SmartGrow SecureAI - Docker Compose
# ============================================
# Запуск всіх сервісів одною командою:
#   docker-compose up -d
#
# Доступ:
#   Frontend: http://localhost
#   Backend API: http://localhost/api/
#   Django Admin: http://localhost/admin/
# ============================================

version: '3.9'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: smartgrow-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: smartgrow
      POSTGRES_USER: smartgrow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SmartGrow2026!SecurePass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartgrow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartgrow-network

  # ============================================
  # Redis Cache (для сесій та кешування)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: smartgrow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-SmartGrowRedis2026!}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartgrow-network

  # ============================================
  # Django Backend
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartgrow-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - DATABASE_URL=postgres://smartgrow:${DB_PASSWORD:-SmartGrow2026!SecurePass}@db:5432/smartgrow
      - REDIS_URL=redis://:${REDIS_PASSWORD:-SmartGrowRedis2026!}@redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,smartgrow.local
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1,http://frontend,http://smartgrow.local
      - IOT_SIMULATION=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --workers 3 --bind 0.0.0.0:8000 --timeout 120 smartgrow.wsgi:application"
    networks:
      - smartgrow-network

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartgrow-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - DJANGO_API_URL=http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - smartgrow-network

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: smartgrow-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - smartgrow-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: smartgrow-postgres
  redis_data:
    name: smartgrow-redis
  static_volume:
    name: smartgrow-static
  media_volume:
    name: smartgrow-media

# ============================================
# Networks
# ============================================
networks:
  smartgrow-network:
    name: smartgrow-network
    driver: bridge
