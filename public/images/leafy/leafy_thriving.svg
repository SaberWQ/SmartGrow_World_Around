  <path d="M94 74 Q100 50 110 62 Q114 73 100 76Z" fill="#4caf50" filter="url(#leaf_glow)" stroke="#2e7d32" stroke-width="0.8"/>
  <path d="M100 74 Q95 50 88 63 Q85 73 100 76Z" fill="#66bb6a" filter="url(#leaf_glow)" stroke="#2e7d32" stroke-width="0.8"/>
  <line x1="100" y1="76" x2="100" y2="58" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- Sprout glow -->
  <ellipse cx="100" cy="62" rx="12" ry="8" fill="#b44fff" opacity="0.2" filter="url(#leaf_glow)"/>

  <!-- EYES / ОЧІ -->
  
  <ellipse cx="84" cy="148" rx="9" ry="10" fill="white"/>
  <ellipse cx="84" cy="149" rx="7" ry="8" fill="#00695c"/>
  <ellipse cx="84" cy="149" rx="4" ry="5" fill="#004d40"/>
  <circle cx="87" cy="145" r="2.5" fill="white"/>
  <circle cx="82" cy="153" r="1" fill="white" opacity="0.5"/>
  <path d="M75 144 Q84 138 93 144" stroke="#1b5e20" stroke-width="1.5" fill="none"/>

  <ellipse cx="116" cy="148" rx="9" ry="10" fill="white"/>
  <ellipse cx="116" cy="149" rx="7" ry="8" fill="#00695c"/>
  <ellipse cx="116" cy="149" rx="4" ry="5" fill="#004d40"/>
  <circle cx="119" cy="145" r="2.5" fill="white"/>
  <circle cx="114" cy="153" r="1" fill="white" opacity="0.5"/>
  <path d="M107 144 Q116 138 125 144" stroke="#1b5e20" stroke-width="1.5" fill="none"/>

