  <path d="M63 146 Q49 137 52 125 Q60 128 64 140Z" fill="#388e3c"/>
  <path d="M137 146 Q151 137 148 125 Q140 128 136 140Z" fill="#388e3c"/>

  <!-- Hair front / Волосся передній шар -->
  <path d="M67 128 Q63 106 73 90 Q86 76 100 74 Q114 76 127 90 Q137 106 133 128"
        fill="#388e3c"/>
  <path d="M67 128 Q65 112 72 96 Q80 86 90 84" stroke="#43a047" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M133 128 Q135 112 128 96 Q120 86 110 84" stroke="#43a047" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Bangs / Чубчик -->
  <path d="M71 118 Q77 93 90 98 Q95 113 87 120Z" fill="#2e7d32"/>
  <path d="M80 114 Q88 90 100 93 Q106 110 97 117Z" fill="#388e3c"/>
  <path d="M129 118 Q123 93 110 98 Q105 113 113 120Z" fill="#2e7d32"/>
  <!-- Hair shine -->
  <path d="M76 88 Q85 80 96 80" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.5"/>

