<?xml version="1.0" encoding="UTF-8"?>
<!-- Leafy - THRIVING mood | © 2026 SmartGrow AI -->
<!-- Ліфі - настрій THRIVING | Авторські права захищені -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <radialGradient id="bg_glow" cx="50%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#b44fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b44fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="skin_grad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffe0b2"/>
      <stop offset="100%" stop-color="#ffcc80"/>
    </radialGradient>
    <filter id="leaf_glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="body_shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#b44fff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ambient glow / Навколишнє свічення -->
  <ellipse cx="100" cy="210" rx="90" ry="40" fill="url(#bg_glow)"/>

  <!-- Ground / Земля -->
  <ellipse cx="100" cy="248" rx="55" ry="16" fill="#1a2e12" opacity="0.8"/>
  <ellipse cx="100" cy="244" rx="50" ry="13" fill="#2d4a1e"/>
  <ellipse cx="100" cy="240" rx="46" ry="11" fill="#3d6b2a"/>
  <!-- Grass blades / Травинки -->
  <path d="M58 237 Q62 226 66 237" fill="#4caf50"/>
  <path d="M72 234 Q77 222 82 234" fill="#66bb6a"/>
  <path d="M118 234 Q123 222 128 234" fill="#4caf50"/>
  <path d="M134 237 Q138 226 142 237" fill="#66bb6a"/>

  <!-- Legs / Ноги -->
  <rect x="88" y="228" width="10" height="18" rx="5" fill="#ffcc80"/>
  <rect x="102" y="228" width="10" height="18" rx="5" fill="#ffcc80"/>
  <!-- Boots / Чоботи -->
  <ellipse cx="93" cy="246" rx="8" ry="5" fill="#2e7d32"/>
  <ellipse cx="107" cy="246" rx="8" ry="5" fill="#2e7d32"/>

  <!-- Dress body / Тіло сукні -->
  <path d="M76 196 Q70 218 74 237 Q100 248 126 237 Q130 218 124 196 Q112 187 100 190 Q88 187 76 196Z"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.2" filter="url(#body_shadow)"/>
  <!-- Leaf pattern on dress / Листковий узор на сукні -->
  <path d="M82 200 Q88 208 82 222" stroke="#43a047" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M92 198 Q97 207 91 220" stroke="#43a047" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M118 200 Q112 208 118 222" stroke="#43a047" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Dress collar leaf / Воротник-листок -->
  <path d="M82 193 Q100 184 118 193 Q113 176 100 179 Q87 176 82 193Z" fill="#388e3c" stroke="#2e7d32" stroke-width="0.8"/>
  <!-- Belt / Пасок -->
  <path d="M78 210 Q100 213 122 210" stroke="#ffd54f" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Arms / Руки -->
  <path d="M76 202 Q57 207 53 222 Q59 225 67 217 Q70 210 78 207Z" fill="#ffcc80" stroke="#ffb74d" stroke-width="0.8"/>
  <path d="M124 202 Q143 207 147 222 Q141 225 133 217 Q130 210 122 207Z" fill="#ffcc80" stroke="#ffb74d" stroke-width="0.8"/>
  <!-- Hand leaves / Листки на руках -->
  <path d="M53 222 Q47 215 50 208 Q56 212 55 220Z" fill="#4caf50" opacity="0.8"/>
  <path d="M147 222 Q153 215 150 208 Q144 212 145 220Z" fill="#4caf50" opacity="0.8"/>

  <!-- Neck / Шия -->
  <rect x="93" y="162" width="14" height="20" rx="6" fill="url(#skin_grad)"/>

  <!-- Head / Голова -->
  <ellipse cx="100" cy="146" rx="38" ry="40" fill="url(#skin_grad)" stroke="#ffb74d" stroke-width="0.8"/>

