  <path d="M75 137 Q84 132 93 137" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M107 137 Q116 132 125 137" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose / Ніс -->
  <path d="M97 158 Q100 162 103 158" stroke="#e8a87c" stroke-width="1.5" fill="none"/>

  <!-- MOUTH / РОТ -->
  <path d="M85 167 Q100 182 115 167" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M90 169 Q100 178 110 169" fill="white" stroke="none" opacity="0.5"/>

  <!-- Blush / Рум'янець -->
  <ellipse cx="73" cy="160" rx="9" ry="5" fill="#80cbc4" opacity="0.4"/>
  <ellipse cx="127" cy="160" rx="9" ry="5" fill="#80cbc4" opacity="0.4"/>

  <!-- Accessories - star / Зірочки -->
  <circle cx="73" cy="130" r="3" fill="#b44fff" opacity="0.6"/>
  <circle cx="127" cy="130" r="3" fill="#b44fff" opacity="0.6"/>

  <!-- Sparkles / Іскри -->
  
  <text x="148" y="120" font-size="14" fill="#ffd700" opacity="0.9">✨</text>
  <text x="30" y="130" font-size="12" fill="#00ff88" opacity="0.8">⭐</text>
  <text x="155" y="165" font-size="11" fill="#00d4ff" opacity="0.7">✦</text>
  <text x="25" y="175" font-size="11" fill="#ffd700" opacity="0.7">✦</text>

  <!-- Floating particles / Плаваючі частинки -->
  
  <circle cx="40" cy="200" r="3" fill="#b44fff" opacity="0.5">
    <animate attributeName="cy" values="200;190;200" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="165" cy="185" r="2" fill="#b44fff" opacity="0.4">
    <animate attributeName="cy" values="185;175;185" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="160" r="2" fill="#b44fff" opacity="0.4">
    <animate attributeName="cy" values="160;150;160" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>