<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#0a1a40" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#04080f" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#001a20" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#04080f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#04080f"/>
  <rect width="400" height="400" fill="url(#bg1)"/>
  <rect width="400" height="400" fill="url(#bg2)"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#1a3a5c" opacity="0.4"/>
  </pattern>
  <rect width="400" height="400" fill="url(#dots)"/>
  <!-- Glowing orbs -->
  <circle cx="80" cy="80" r="60" fill="#00d4ff" opacity="0.03"/>
  <circle cx="320" cy="300" r="80" fill="#00ff88" opacity="0.025"/>
  <circle cx="350" cy="60" r="50" fill="#b44fff" opacity="0.02"/>
</svg>