<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#04080f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#04080f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#b44fff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#04080f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base background -->
  <rect width="1440" height="900" fill="#04080f"/>
  <!-- Gradient overlays -->
  <rect width="1440" height="900" fill="url(#bg1)"/>
  <rect width="1440" height="900" fill="url(#bg2)"/>
  <rect width="1440" height="900" fill="url(#bg3)"/>
  <!-- Grid lines horizontal -->
  <g stroke="#0a1525" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="150" x2="1440" y2="150"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="450" x2="1440" y2="450"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="750" x2="1440" y2="750"/>
  </g>
  <!-- Grid lines vertical -->
  <g stroke="#0a1525" stroke-width="0.5" opacity="0.6">
    <line x1="240" y1="0" x2="240" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
  <!-- Particles / Частинки -->
  <g opacity="0.4">
    <circle cx="120" cy="80"  r="2" fill="#00d4ff"/>
    <circle cx="350" cy="200" r="1.5" fill="#00ff88"/>
    <circle cx="890" cy="120" r="2" fill="#b44fff"/>
    <circle cx="1200" cy="300" r="1.5" fill="#00d4ff"/>
    <circle cx="600" cy="700" r="2" fill="#00ff88"/>
    <circle cx="1350" cy="500" r="1.5" fill="#ff4da6"/>
    <circle cx="80" cy="600"  r="2" fill="#00d4ff"/>
    <circle cx="450" cy="800" r="1.5" fill="#b44fff"/>
    <circle cx="1100" cy="750" r="2" fill="#00ff88"/>
    <circle cx="700" cy="50"  r="1.5" fill="#ff4da6"/>
  </g>
</svg>