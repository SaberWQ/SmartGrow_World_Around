<?xml version="1.0" encoding="UTF-8"?>
<!-- Trust Score Ring - Green (High) / Кільце довіри - Зелений (Високий) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="ring_g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="54" fill="none" stroke="#0a1525" stroke-width="10"/>
